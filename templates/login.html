<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>Login – Customer Churn Predictor</title>
    <meta name="description"
        content="Login to the Customer Churn Prediction tool powered by an ensemble ML model (RandomForest, XGBoost, LightGBM, CatBoost).">
    <meta name="keywords" content="customer churn, churn prediction, machine learning, telecom, AI">
    <meta name="author" content="Pawan Simha">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Customer Churn Predictor">
    <meta property="og:description" content="Predict telecom customer churn using an ensemble ML model.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{{ url_for('static', filename='Churn.jpg') }}">

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='Churn.jpg') }}">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        /* Center the login card perfectly on screen */
        body {
            justify-content: center;
            min-height: 100vh;
        }

        /* Password field wrapper for eye icon */
        .password-wrapper {
            position: relative;
            margin-top: 6px;
        }

        .password-wrapper input {
            width: 100%;
            padding: 11px 44px 11px 14px;
            /* right padding for the icon */
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .password-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.18);
            outline: none;
        }

        /* Eye toggle button */
        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin: 0;
            width: auto;
            box-shadow: none;
            color: #999;
            font-size: 1.1rem;
            line-height: 1;
            transition: color 0.2s ease;
        }

        .eye-toggle:hover {
            color: var(--accent);
            background: none;
            box-shadow: none;
            transform: translateY(-50%);
        }
    </style>
</head>

<body>
    <div class="container login-container">

        <!-- Logo / Icon -->
        <div style="text-align:center; margin-bottom:12px;">
            <img src="{{ url_for('static', filename='Churn.jpg') }}" alt="Churn Predictor Logo"
                style="width:72px; height:72px; border-radius:50%; object-fit:cover; box-shadow:0 4px 16px rgba(74,144,226,0.25);">
        </div>

        <h2>Customer Churn Predictor</h2>
        <p style="text-align:center; color:#888; margin-bottom:28px; font-size:0.88rem;">
            Sign in to access the prediction tool
        </p>

        <!-- Login form -->
        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="username">Username</label>
            <input id="username" type="text" name="username" placeholder="Enter your username" autocomplete="username"
                required style="margin-top:6px;">

            <label for="password" style="margin-top:18px;">Password</label>
            <div class="password-wrapper">
                <input id="password" type="password" name="password" placeholder="Enter your password"
                    autocomplete="current-password" required>
                <!-- Eye icon toggle -->
                <button type="button" class="eye-toggle" id="eyeBtn" aria-label="Toggle password visibility"
                    onclick="togglePassword()">
                    <!-- Eye open icon -->
                    <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <!-- Eye off icon (hidden by default) -->
                    <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="display:none">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                </button>
            </div>

            <button type="submit" style="margin-top:28px;">Login</button>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
        </form>

        <!-- Footer -->
        <div class="footer">
            Developed by
            <a href="https://github.com/PawanSimha" target="_blank" rel="noopener">Pawan Simha</a>
            &nbsp;|&nbsp;
            <a href="https://linkedin.com/in/pawansimha" target="_blank" rel="noopener">LinkedIn</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const iconShow = document.getElementById('iconShow');
            const iconHide = document.getElementById('iconHide');
            const btn = document.getElementById('eyeBtn');
            if (input.type === 'password') {
                input.type = 'text';
                iconShow.style.display = 'none';
                iconHide.style.display = 'inline';
                btn.setAttribute('aria-label', 'Hide password');
            } else {
                input.type = 'password';
                iconShow.style.display = 'inline';
                iconHide.style.display = 'none';
                btn.setAttribute('aria-label', 'Show password');
            }
        }
    </script>
</body>

</html>
